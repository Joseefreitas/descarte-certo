{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro — Pessoa Física</title>
    <link rel="stylesheet" href="{% static 'css/cadastro.css' %}">
</head>
<body>

<div class="cadastro-page">
    <div class="cadastro-card">

        <div class="cadastro-card__header">
            <a class="voltar" href="{% url 'login' %}">← Voltar</a>
            <h1>Cadastro — Pessoa Física</h1>
            <p>Preencha seus dados para criar uma conta</p>
        </div>

        {% if erro %}
            <div class="alerta-erro">{{ erro }}</div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="campo">
                <label for="username">Nome de usuário</label>
                <input type="text" id="username" name="username" placeholder="Nome de usuário" required>
            </div>

            <div class="linha">
                <div class="campo">
                    <label for="first_name">Nome</label>
                    <input type="text" id="first_name" name="first_name" placeholder="Nome" required>
                </div>
                <div class="campo">
                    <label for="last_name">Sobrenome</label>
                    <input type="text" id="last_name" name="last_name" placeholder="Sobrenome" required>
                </div>
            </div>

            <div class="campo">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" placeholder="seu@email.com" required>
            </div>

            <div class="campo">
                <label for="cpf">CPF</label>
                <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" maxlength="14" required>
            </div>

            <div class="campo">
                <label for="senha">Senha</label>
                <div class="senha-wrap">
                    <input type="password" id="senha" name="senha" placeholder="Crie uma senha" required>
                    <span class="olho" onclick="toggleSenha()">👁</span>
                </div>
            </div>

            <button type="submit" class="btn-primary">Cadastrar</button>
        </form>

        <p class="login-link">Já possui conta? <a href="{% url 'login' %}">Fazer login</a></p>

    </div>
</div>

<script>
function toggleSenha() {
    const input = document.getElementById("senha");
    input.type = input.type === "password" ? "text" : "password";
}

document.getElementById('cpf').addEventListener('input', function (e) {
    let v = e.target.value.replace(/\D/g, '');
    v = v.replace(/(\d{3})(\d)/, '$1.$2');
    v = v.replace(/(\d{3})(\d)/, '$1.$2');
    v = v.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
    e.target.value = v;
});
</script>

</body>
</html>
