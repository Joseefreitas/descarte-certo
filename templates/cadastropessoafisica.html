{% load static %}

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Pessoa Física</title>
    <link rel="stylesheet" href="{% static 'css/cadastro_pessoa_fisica.css' %}">
</head>
<body>

    <div class="topo">
        Descarte Certo
    </div>

    <div class="container">

        <a class="voltar" href="{% url 'eusou' %}">← Voltar</a>

        <h1>Cadastro — Pessoa Física</h1>

        {% if erro %}
            <p class="erro">{{ erro }}</p>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <input type="text" name="username" placeholder="Nome de usuário" required>
            <input type="text" name="first_name" placeholder="Nome" required>
            <input type="text" name="last_name" placeholder="Sobrenome" required>
            <input type="email" name="email" placeholder="E-mail" required>
            <input type="text" name="cpf" placeholder="CPF: 000.000.000-00" maxlength="14" id="cpf" required>

            <div class="senha-container">
                <input
                    type="password"
                    id="senha"
                    name="senha"
                    placeholder="Senha"
                    required
                >
                <span class="olho" onclick="toggleSenha()">
                    <svg xmlns="http://www.w3.org/2000/svg"
                        width="20" height="20" viewBox="0 0 24 24"
                        fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                </span>
            </div>

            <button type="submit">Cadastrar</button>
        </form>

        <p>Já possui conta? <a href="{% url 'login' %}">Fazer login</a></p>

    </div>

    <script>
    function toggleSenha() {
        const input = document.getElementById("senha");
        input.type = input.type === "password" ? "text" : "password";
    }

    // Máscara CPF
    document.getElementById('cpf').addEventListener('input', function (e) {
        let v = e.target.value.replace(/\D/g, '');
        if (v.length <= 11) {
            v = v.replace(/(\d{3})(\d)/, '$1.$2');
            v = v.replace(/(\d{3})(\d)/, '$1.$2');
            v = v.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
        }
        e.target.value = v;
    });
    </script>

</body>
</html>
