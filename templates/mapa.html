{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="{% static 'css/mapa.css' %}">
{% endblock %}

{% block content %}
    <div class="container-mapa" style="padding: 20px;">
        <h2 style="margin-bottom: 20px;">Pontos de Descarte em Recife</h2>
        
        <div id="mapa-container" style="height: 600px; width: 100%; border-radius: 10px; z-index: 1;"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="{% static 'js/mapa.js' %}"></script>
    
    <script>
        {% for ponto in pontos %}
            try {
                // Força a troca de vírgula por ponts
                var latText = "{{ ponto.latitude|default:'0' }}";
                var lngText = "{{ ponto.longitude|default:'0' }}";
                
                var lat = parseFloat(latText.replace(',', '.'));
                var lng = parseFloat(lngText.replace(',', '.'));
                
                // Só desenha se as coordenadas estiverem preenchidas e corretas
                if (!isNaN(lat) && !isNaN(lng) && lat !== 0 && lng !== 0) {
                    var marker = L.marker([lat, lng]).addTo(map);
                    
                    var conteudoPopup = "<b>{{ ponto.nome }}</b><br>" +
                        "Aceita: {{ ponto.tipo_residuo }}<br>" +
                        "📍 {{ ponto.endereco }}<br><br>" +
                        "<a href='https://www.google.com/maps/dir/?api=1&destination=" + lat + "," + lng + "' target='_blank' style='display: block; background-color: #008000; color: white; text-align: center; padding: 8px; border-radius: 5px; text-decoration: none; font-weight: bold;'>Traçar Rota 🚗</a>";
                    
                    marker.bindPopup(conteudoPopup);
                }
            } catch(e) {
                console.error("Erro ao carregar o ponto {{ ponto.nome }}: ", e);
            }
        {% endfor %}
    </script>
{% endblock %}
