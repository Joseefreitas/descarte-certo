{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Descarte Certo</title>
    <link rel="shortcut icon" href="{% static 'image/cdlogo.png' %}" type="image/x-icon">
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body>

<div class="cadastro-page">
    <div class="cadastro-card">

        <div class="cadastro-card__header">
            <div class="login-logo">
                <img src="{% static 'image/cdlogo.png' %}" alt="Logo Descarte Certo">
                <span>Descarte Certo</span>
            </div>
            <h1>Entrar</h1>
            <p>Acesse sua conta para continuar</p>
        </div>

        {% if erro %}
            <div class="alerta-erro">{{ erro }}</div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="campo">
                <label for="username">Usuário</label>
                <input type="text" id="username" name="username" placeholder="Nome de usuário" required>
            </div>

            <div class="campo">
                <label for="senha">Senha</label>
                <div class="senha-wrap">
                    <input type="password" id="senha" name="password" placeholder="Sua senha" required>
                    <span class="olho" onclick="toggleSenha()">👁</span>
                </div>
            </div>

            <button type="submit" class="btn-primary">Entrar</button>
        </form>

        <a href="{% url 'guest' %}" class="btn-guest">Continuar como visitante</a>

        <p class="login-link">
            Não possui conta?
            <a href="{% url 'cadastropessoafisica' %}">Pessoa Física</a> ou
            <a href="{% url 'cadastropessoajuridica' %}">Empresa</a>
        </p>

    </div>
</div>

<script>
function toggleSenha() {
    const input = document.getElementById("senha");
    input.type = input.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
