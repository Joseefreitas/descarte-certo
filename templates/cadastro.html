{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/cadastro.css' %}">
{% endblock %}

{% block content %}

<div class="cadastro-container">

    <h1 class="cadastro-titulo">Cadastro</h1>

    {% if erro %}
        <p class="erro">
            {{ erro }}
        </p>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <input
            type="text"
            name="username"
            placeholder="Usuário"
            required
            class="input"
        >

        <input
            type="email"
            name="email"
            placeholder="Email"
            required
            class="input"
        >

        <input
            type="password"
            name="senha"
            placeholder="Senha"
            required
            class="input"
        >

        <button type="submit" class="botao">
            Cadastrar
        </button>
    </form>

    <p class="login-texto">
        Já possui conta?
        <a href="{% url 'login' %}" class="link">
            Fazer login
        </a>
    </p>

</div>

{% endblock %}
