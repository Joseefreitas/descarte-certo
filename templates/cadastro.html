{% extends 'base.html' %}

{% block content %}

<div style="max-width: 400px; margin: 50px auto; padding: 30px;">

    <h1 style="text-align: center;">Cadastro</h1>

    {% if erro %}
        <p style="color: red; text-align: center;">
            {{ erro }}
        </p>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <input
            type="text"
            name="username"
            placeholder="Usuário"
            required
            style="width: 100%; padding: 10px; margin-bottom: 15px;"
        >

        <input
            type="email"
            name="email"
            placeholder="Email"
            required
            style="width: 100%; padding: 10px; margin-bottom: 15px;"
        >

        <input
            type="password"
            name="senha"
            placeholder="Senha"
            required
            style="width: 100%; padding: 10px; margin-bottom: 15px;"
        >

        <button
            type="submit"
            style="
                width: 100%;
                background: green;
                color: white;
                padding: 10px;
                border: none;
                border-radius: 8px;
                cursor: pointer;
            "
        >
            Cadastrar
        </button>
    </form>

    <p style="text-align: center; margin-top: 20px;">
        Já possui conta?
        <a href="{% url 'login' %}">
            Fazer login
        </a>
    </p>

</div>

{% endblock %}
