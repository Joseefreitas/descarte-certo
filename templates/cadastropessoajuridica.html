{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro — Empresa</title>
    <link rel="stylesheet" href="{% static 'css/cadastro.css' %}">
</head>
<body>

<div class="cadastro-page">
    <div class="cadastro-card">

        <div class="cadastro-card__header">
            <a class="voltar" href="{% url 'login' %}">← Voltar</a>
            <h1>Cadastro de Empresa</h1>
            <p>Preencha os dados da sua empresa</p>
        </div>

        {% if erro %}
            <div class="alerta-erro">{{ erro }}</div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <fieldset>
                <legend>Dados de acesso</legend>

                <div class="campo">
                    <label for="username">Usuário</label>
                    <input type="text" id="username" name="username" placeholder="Nome de usuário" required>
                </div>

                <div class="campo">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" placeholder="empresa@email.com" required>
                </div>

                <div class="campo">
                    <label for="senha">Senha</label>
                    <div class="senha-wrap">
                        <input type="password" id="senha" name="senha" placeholder="Crie uma senha" required>
                        <span class="olho" onclick="toggleSenha()">👁</span>
                    </div>
                </div>
            </fieldset>

            <fieldset>
                <legend>Dados da empresa</legend>

                <div class="campo">
                    <label for="razao_social">Razão social</label>
                    <input type="text" id="razao_social" name="razao_social" placeholder="Razão social da empresa" required>
                </div>

                <div class="campo">
                    <label for="nome_fantasia">Nome fantasia</label>
                    <input type="text" id="nome_fantasia" name="nome_fantasia" placeholder="Nome fantasia (opcional)">
                </div>

                <div class="campo">
                    <label for="cnpj">CNPJ</label>
                    <input type="text" id="cnpj" name="cnpj" placeholder="00.000.000/0000-00" maxlength="18" required>
                </div>

                <div class="linha">
                    <div class="campo">
                        <label for="first_name">Nome do responsável</label>
                        <input type="text" id="first_name" name="first_name" placeholder="Nome" required>
                    </div>
                    <div class="campo">
                        <label for="last_name">Sobrenome</label>
                        <input type="text" id="last_name" name="last_name" placeholder="Sobrenome" required>
                    </div>
                </div>

                <div class="campo">
                    <label for="bairros_atendidos">Bairros atendidos</label>
                    <input type="text" id="bairros_atendidos" name="bairros_atendidos" placeholder="Ex: Boa Viagem, Recife, Afogados" required>
                </div>

                <div class="campo">
                    <label>Tipos de resíduo coletados</label>
                    <div class="checkboxes">
                        <label><input type="checkbox" name="tipos_residuo" value="papel"> Papel e Papelão</label>
                        <label><input type="checkbox" name="tipos_residuo" value="plastico"> Plástico</label>
                        <label><input type="checkbox" name="tipos_residuo" value="organico"> Orgânico</label>
                        <label><input type="checkbox" name="tipos_residuo" value="eletronico"> Eletrônico</label>
                        <label><input type="checkbox" name="tipos_residuo" value="metais"> Metais</label>
                        <label><input type="checkbox" name="tipos_residuo" value="vidro"> Vidro</label>
                    </div>
                </div>
            </fieldset>

            <button type="submit" class="btn-primary">Cadastrar empresa</button>
        </form>

        <p class="login-link">Já tem conta? <a href="{% url 'login' %}">Entrar</a></p>

    </div>
</div>

<script>
function toggleSenha() {
    const input = document.getElementById("senha");
    input.type = input.type === "password" ? "text" : "password";
}

document.getElementById('cnpj').addEventListener('input', function (e) {
    let v = e.target.value.replace(/\D/g, '');
    v = v.replace(/^(\d{2})(\d)/, '$1.$2');
    v = v.replace(/^(\d{2})\.(\d{3})(\d)/, '$1.$2.$3');
    v = v.replace(/\.(\d{3})(\d)/, '.$1/$2');
    v = v.replace(/(\d{4})(\d)/, '$1-$2');
    e.target.value = v;
});
</script>

</body>
</html>
